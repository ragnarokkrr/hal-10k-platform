# nginx.conf — Docker socket proxy for Traefik
#
# Rewrites any versioned Docker API path (/v1.XX/...) to /v1.45/ so that
# Traefik's Docker SDK client (which negotiates starting at v1.24) can connect
# to Docker CE 29+ (which enforces a minimum API version of 1.40).
#
# See: docs/decisions/adr/ADR-0005-docker-socket-proxy.md

# Worker processes run as root to access /var/run/docker.sock
user root;

events {}

http {
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    upstream docker_daemon {
        server unix:/var/run/docker.sock;
        keepalive 10;
    }

    server {
        listen 2375 default_server;

        # Versioned paths: rewrite /vX.YY/... → /v1.45/...
        location ~ ^/v[0-9.]+/(.*)$ {
            rewrite         ^/v[0-9.]+/(.*)$ /v1.45/$1 break;
            proxy_pass      http://docker_daemon;
            proxy_http_version 1.1;
            proxy_set_header   Host       $http_host;
            proxy_set_header   Connection "";
            proxy_read_timeout 600s;
            proxy_buffering    off;
        }

        # Unversioned paths (e.g. /ping, /_ping)
        location / {
            proxy_pass      http://docker_daemon;
            proxy_http_version 1.1;
            proxy_set_header   Host       $http_host;
            proxy_set_header   Connection "";
            proxy_read_timeout 600s;
            proxy_buffering    off;
        }
    }
}
