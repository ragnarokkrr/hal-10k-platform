# Traefik v3 — static configuration
# Loaded at startup; requires container restart on changes.

# Entrypoints
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
  dashboard:
    address: ":8080"
  metrics:
    address: ":8082"

# Docker provider
# Endpoint points to docker-socket-proxy (see ADR-0005), not the raw socket.
providers:
  docker:
    endpoint: "tcp://docker-socket-proxy:2375"
    exposedByDefault: false
    network: traefik
  file:
    directory: /etc/traefik/dynamic
    watch: true

# API / dashboard
api:
  dashboard: true
  insecure: false

# Logging
log:
  level: INFO

# Access logs
accessLog: {}

# Ping endpoint (used by Docker healthcheck)
# Bound to the dashboard entrypoint to avoid conflicting with the internal :8080 default.
ping:
  entryPoint: "dashboard"

# Prometheus metrics
# Exposed on the metrics entrypoint (:8082), scraped by Prometheus via observability_internal network.
# Port 8082 is NOT mapped to the host.
metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
