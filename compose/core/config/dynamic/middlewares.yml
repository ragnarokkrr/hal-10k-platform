# Traefik v3 — dynamic middleware configuration
# Reloaded automatically by the file provider (watch: true).
# Go template interpolation is supported; {{ env "VAR" }} reads from the container environment.

http:
  middlewares:

    # Redirect all HTTP traffic to HTTPS
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

    # Basic-auth for the Traefik dashboard
    # TRAEFIK_DASHBOARD_AUTH is an htpasswd-format string (user:hash) from secrets/core.yaml.
    dashboard-auth:
      basicAuth:
        users:
          - "{{ env `TRAEFIK_DASHBOARD_AUTH` }}"
