# compose/ai-tools/docker-compose.yml
# llama.cpp Function-Calling Stack — one service per model
#
# Prerequisites:
#   1. ai_internal network exists: docker compose -f compose/ai/docker-compose.yml up -d
#      (ai containers don't need to be running — just the network must exist)
#   2. observability_internal network exists: docker compose -f compose/observability/docker-compose.yml up -d
#   3. GGUF models downloaded:  see docs/runbooks/gguf-model-setup.md
#   4. Image tag set:           copy .env.example → .env, pin LLAMACPP_IMAGE tag
#
# Start a specific model:
#   docker compose -f compose/ai-tools/docker-compose.yml up -d llama-cpp-qwen32b
#
# Start all models (ensure VRAM budget allows — see design.md D3):
#   docker compose -f compose/ai-tools/docker-compose.yml up -d
#
# Stop a model to free VRAM:
#   docker compose -f compose/ai-tools/docker-compose.yml stop llama-cpp-llama70b
#
# Network topology:
#   ai_internal           ← LiteLLM routes inference requests to each container
#   observability_internal ← Prometheus scrapes /metrics on port 8080

# ── Shared base configuration ─────────────────────────────────────────────────
# All llama.cpp services extend this anchor. Each service overrides only the
# model-specific --model and --n-gpu-layers flags via its command.
x-llama-base: &llama-base
  image: ${LLAMACPP_IMAGE}
  restart: unless-stopped

  # AMD GPU passthrough — same pattern as Ollama in compose/ai/.
  # /dev/kfd: ROCm kernel driver; /dev/dri: DRM render nodes (GPU compute).
  devices:
    - /dev/kfd
    - /dev/dri
  group_add:
    - "44"   # video
    - "992"  # render

  environment:
    # AMD Radeon 8060S (gfx1102) requires gfx1100 (11.0.0) override for ROCm HIP
    # kernels to load correctly. 11.0.2 causes a segfault in sched_reserve.
    HSA_OVERRIDE_GFX_VERSION: "11.0.0"

  volumes:
    # GGUF weights — shared read-only mount across all containers.
    # Each service references its model file via --model flag.
    - /srv/platform/models/gguf/:/models:ro

  networks:
    - ai_internal
    - observability_internal

  # llama.cpp /health returns 200 once model is fully loaded.
  # start_period allows time for large model weights to load from disk.
  healthcheck:
    test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 120s

services:

  # ── Qwen2.5-Coder 32B — primary coding + tool-calling model ─────────────────
  llama-cpp-qwen32b:
    <<: *llama-base
    container_name: llama-cpp-qwen32b
    command:
      - --model
      - /models/Qwen2.5-Coder-32B-Instruct-Q4_K_M.gguf
      - --port
      - "8080"
      - --host
      - "0.0.0.0"
      - --jinja
      - --metrics
      - --n-gpu-layers
      - "${N_GPU_LAYERS_QWEN32B:-99}"
      - --ctx-size
      - "${CTX_SIZE:-16384}"

  # ── DeepSeek-R1 32B — reasoning + tool-calling model ─────────────────────────
  llama-cpp-deepseek32b:
    <<: *llama-base
    container_name: llama-cpp-deepseek32b
    command:
      - --model
      - /models/DeepSeek-R1-Distill-Qwen-32B-Q4_K_M.gguf
      - --port
      - "8080"
      - --host
      - "0.0.0.0"
      - --jinja
      - --metrics
      - --n-gpu-layers
      - "${N_GPU_LAYERS_DEEPSEEK32B:-99}"
      - --ctx-size
      - "${CTX_SIZE:-16384}"

  # ── Llama 3.3 70B — general instruction + tool-calling model (optional) ───────
  # Requires Llama-3.3-70B-Instruct-Q4_K_M.gguf (~43 GB) in /srv/platform/models/gguf/
  # See docs/runbooks/gguf-model-setup.md Step 5.
  llama-cpp-llama70b:
    <<: *llama-base
    container_name: llama-cpp-llama70b
    command:
      - --model
      - /models/Llama-3.3-70B-Instruct-Q4_K_M.gguf
      - --port
      - "8080"
      - --host
      - "0.0.0.0"
      - --jinja
      - --metrics
      - --n-gpu-layers
      - "${N_GPU_LAYERS_LLAMA70B:-99}"
      - --ctx-size
      - "${CTX_SIZE:-16384}"

networks:
  ai_internal:
    external: true
    name: ai_internal
  observability_internal:
    external: true
    name: observability_internal
