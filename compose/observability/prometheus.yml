# compose/observability/prometheus.yml
# Prometheus scrape configuration for the HAL-10k platform.
#
# All targets are on the observability_internal Docker network.
# Traefik also attaches to observability_internal (see compose/core/docker-compose.yml).
#
# Scrape interval: 15s global default.
# Retention: 30d (set via --storage.tsdb.retention.time in docker-compose.yml).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    host: hal-10k

scrape_configs:

  # ── Prometheus self-monitoring ──────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── Host metrics (Node Exporter) ────────────────────────────────────────
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── Per-container resource metrics (cAdvisor) ───────────────────────────
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    # cAdvisor exposes many time series; drop high-cardinality unused ones.
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "container_(network_tcp_usage_total|tasks_state|cpu_load_average_10s)"
        action: drop

  # ── Traefik request & routing metrics ───────────────────────────────────
  # Requires Traefik to have --entrypoints.metrics.address=:8082 configured
  # and the traefik container attached to the observability_internal network.
  - job_name: traefik
    static_configs:
      - targets: ["traefik:8082"]

  # ── ROCm GPU metrics ─────────────────────────────────────────────────────
  # rocm-smi-exporter exposes GPU utilisation, VRAM, temperature, power draw.
  # Uncomment and update image/target once exporter is deployed.
  # - job_name: rocm-gpu
  #   static_configs:
  #     - targets: ["rocm-exporter:9400"]
